name: Set var test

on: [push]

jobs:
  var-job:
    runs-on: ubuntu-latest
    steps:
      - name: set-var
        run: |
          echo "MY_VAL = Hello_mars" >> $GITHUB_ENV
      - name: display-var
        run: |
          echo "$MY_VAL"
  setup-job:
    uses: actions/setup-python@v5
    with:
      python_version : 3.12
      
  print-job:
    runs-on: ubuntu-latest
    steps:
      - name: test-var
        run: python print_py.py